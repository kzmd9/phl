<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топ Бомбардиров - PHL Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(15, 35, 35, 0.85);
            --bg-hover: #1e293b;
            --teal-dark: #0a1f1f;
            --teal-medium: #0f766e;
            --teal-light: #14b8a6;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(20, 184, 166, 0.3);
            --danger: #ef4444;
            --success: #10b981;
            --glow: 0 0 20px rgba(20, 184, 166, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--teal-dark);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 31, 31, 0.7);
            z-index: -1;
        }

        /* --- Анимации --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: var(--glow); }
            50% { box-shadow: 0 0 35px rgba(20, 184, 166, 0.5); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Плавные кривые анимации */
        .ease-smooth { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .ease-bounce { transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }

        .animate-fade { animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-fade-up { animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-slide-right { animation: slideInRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        /* --- Header --- */
        header {
            background: rgba(10, 31, 31, 0.95);
            border-bottom: 2px solid var(--teal-light);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-section:hover { transform: scale(1.03); }

        .logo-shield {
            width: 50px;
            height: 60px;
            background: linear-gradient(135deg, var(--teal-medium), var(--teal-dark));
            clip-path: polygon(50% 100%, 0 40%, 0 15%, 50% 0, 100% 15%, 100% 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: white;
            border: 2px solid var(--teal-light);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-section:hover .logo-shield {
            box-shadow: var(--glow);
            border-color: var(--teal-light);
            animation: float 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .logo-text { display: flex; flex-direction: column; }

        .logo-title {
            font-family: 'Russo One', sans-serif;
            font-size: 24px;
            color: var(--teal-light);
            letter-spacing: 2px;
            line-height: 1;
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-section:hover .logo-title { color: white; text-shadow: var(--glow); }

        .logo-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Меню */
        .nav-menu { display: flex; gap: 15px; align-items: center; }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 0; height: 2px;
            background: var(--teal-light);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }

        .nav-link:hover::after, .nav-link.active::after { width: 80%; }

        .nav-link:hover, .nav-link.active {
            color: var(--teal-light);
            background: rgba(20, 184, 166, 0.1);
            border-color: rgba(20, 184, 166, 0.3);
        }

        /* --- Hero Section --- */
        .hero {
            padding: 50px 0 30px;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .season-title {
            font-family: 'Russo One', sans-serif;
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 20px rgba(20, 184, 166, 0.4);
            animation: pulseGlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* --- Main Content --- */
        .main-content { padding: 40px 0 60px; }

        .top-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: slideInRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 900px;
            margin: 0 auto;
        }

        .top-card:hover {
            border-color: var(--teal-light);
            box-shadow: var(--glow);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .section-title {
            font-family: 'Russo One', sans-serif;
            font-size: 24px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 28px;
            background: var(--teal-light);
            border-radius: 2px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .leaderboard-table th {
            text-align: left;
            font-size: 12px;
            color: var(--text-muted);
            padding: 10px 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Контейнер строки для независимой анимации */
        .player-row-container {
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, box-shadow;
        }

        .leaderboard-table tbody tr {
            cursor: pointer;
        }

        .leaderboard-table tbody tr td {
            padding: 14px 18px;
            background: rgba(15, 35, 35, 0.6);
            vertical-align: middle;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .leaderboard-table tbody tr td:first-child {
            border-radius: 8px 0 0 8px;
            width: 75%;
        }

        .leaderboard-table tbody tr td:last-child {
            border-radius: 0 8px 8px 0;
            text-align: center;
            min-width: 80px;
            position: relative;
        }

        /* Подсветка всей строки одним прямоугольником */
        .leaderboard-table tbody tr:hover td {
            background: rgba(20, 184, 166, 0.15);
            box-shadow: 0 0 25px rgba(20, 184, 166, 0.25);
            border: 1px solid rgba(20, 184, 166, 0.4);
        }

        /* Увеличение только содержимого строки без влияния на список */
        .leaderboard-table tbody tr:hover .player-row-container {
            transform: scale(1.02);
            z-index: 10;
        }

        .player-row { 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        .rank {
            font-family: 'Russo One', sans-serif;
            font-size: 16px;
            width: 32px;
            text-align: center;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .rank.gold { color: #fbbf24; }
        .rank.silver { color: #94a3b8; }
        .rank.bronze { color: #b45309; }

        .leaderboard-table tbody tr:hover .rank {
            color: var(--teal-light);
            text-shadow: 0 0 10px rgba(20, 184, 166, 0.6);
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--teal-dark);
            background-size: cover;
            image-rendering: pixelated;
            border: 2px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            will-change: transform, box-shadow;
        }

        .leaderboard-table tbody tr:hover .player-avatar {
            border-color: var(--teal-light);
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.4);
            transform: scale(1.1);
        }

        .player-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leaderboard-table tbody tr:hover .player-name { 
            color: var(--teal-light);
            text-shadow: 0 0 10px rgba(20, 184, 166, 0.4);
        }

        .stat-value {
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            color: var(--teal-light);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            position: relative;
            text-align: center;
            width: 100%;
            will-change: transform, text-shadow;
        }

        .leaderboard-table tbody tr:hover .stat-value {
            transform: scale(1.15);
            text-shadow: 0 0 15px rgba(20, 184, 166, 0.8);
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 16px;
            background: linear-gradient(90deg, transparent, rgba(20,184,166,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .refresh-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 8px 16px;
            background: var(--teal-medium);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .refresh-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .refresh-btn:hover::before { left: 100%; }

        .refresh-btn:hover {
            background: var(--teal-light);
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .refresh-btn:active { transform: translateY(0) scale(0.98); }

        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Footer --- */
        footer {
            background: rgba(10, 31, 31, 0.95);
            border-top: 2px solid var(--border-color);
            padding: 30px 0;
            margin-top: 40px;
            animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
        }

        .footer-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .copyright {
            color: var(--text-muted);
            font-size: 14px;
        }

        .discord-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--teal-light);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(20, 184, 166, 0.1);
            border: 2px solid var(--teal-light);
            border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .discord-link::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--teal-light);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .discord-link:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .discord-link:hover {
            color: var(--teal-dark);
            transform: translateY(-3px);
            box-shadow: var(--glow);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .discord-link:hover .discord-icon {
            animation: float 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .season-title { font-size: 36px; }
            .header-wrapper { flex-direction: column; height: auto; padding: 15px 0; gap: 15px; }
            .nav-menu { gap: 10px; }
            .nav-link { font-size: 12px; padding: 6px 12px; }
            .section-title { font-size: 20px; }
            .footer-content { flex-direction: column; text-align: center; }
            .top-card { padding: 20px; }
            .player-avatar { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-wrapper">
                <div class="logo-section" onclick="window.location.href='index.html'">
                    <div class="logo-shield">PHL</div>
                    <div class="logo-text">
                        <div class="logo-title">PHL STATS</div>
                        <div class="logo-subtitle">Pepeland Hockey League</div>
                    </div>
                </div>

                <nav class="nav-menu">
                    <a href="index.html" class="nav-link">Матчи</a>
                    <a href="teams.html" class="nav-link">Команды</a>
                    <a href="players.html" class="nav-link">Игроки</a>
                    <a href="Standings.html" class="nav-link">Таблица</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 class="season-title">Топ Бомбардиров</h1>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="top-card">
                <div class="section-header">
                    <h2 class="section-title">Лучшие снайперы сезона</h2>
                </div>
                
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Игрок</th>
                            <th>Голы</th>
                        </tr>
                    </thead>
                    <tbody id="topScorersBody">
                        <tr>
                            <td colspan="2" class="loading">⏳ Загрузка статистики...</td>
                        </tr>
                    </tbody>
                </table>
                
                <button class="refresh-btn" id="refreshBtn" onclick="loadTopScorers()">
                    Обновить
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="copyright">
                    &copy; 2026 PHL Stats. Pepeland Hockey League
                </div>
                <a href="https://discord.gg/cDBgBz6VgW" target="_blank" class="discord-link">
                    <svg class="discord-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                    Discord сервер
                </a>
            </div>
        </div>
    </footer>

    <script>
        const GOOGLE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6qEFPLrt6YiJa85CdGvkaJaNDi7j3R-_0oDwX1aNd_idorz6HwffjNlr6nA1vW9YppESeN0oXCaLT/pub?output=csv&gid=0&single=true';
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
        const isLocal = window.location.protocol === 'file:';
        const CSV_URL = isLocal ? CORS_PROXY + encodeURIComponent(GOOGLE_CSV) : GOOGLE_CSV;
        
        const tbody = document.getElementById('topScorersBody');
        const refreshBtn = document.getElementById('refreshBtn');

        async function loadTopScorers() {
            tbody.innerHTML = '<tr><td colspan="2" class="loading">⏳ Загрузка...</td></tr>';
            refreshBtn.disabled = true;
            
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim());
                
                if (lines.length < 2) throw new Error('Таблица пуста');
                
                const players = [];
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const parts = line.split(',').map(p => p.replace(/^"|"$/g, '').trim());
                    const nick = parts[0];
                    const goals = parseInt(parts[1]) || 0;
                    if (nick && nick.length > 0) players.push({ nick, goals });
                }
                
                if (players.length === 0) throw new Error('Нет игроков');
                
                players.sort((a, b) => b.goals - a.goals);
                const top = players;
                
                tbody.innerHTML = '';
                top.forEach((player, index) => {
                    const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                    const tr = document.createElement('tr');
                    tr.style.opacity = '0';
                    tr.style.animation = `fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) ${Math.min(index * 0.03, 0.5)}s forwards`;
                    tr.innerHTML = `
                        <td>
                            <div class="player-row-container">
                                <div class="player-row">
                                    <span class="rank ${rankClass}">#${index + 1}</span>
                                    <div class="player-avatar" 
                                         style="background-image: url('https://mc-heads.net/avatar/${encodeURIComponent(player.nick)}')"
                                         onerror="this.style.background='var(--teal-dark)'">
                                    </div>
                                    <span class="player-name">${escapeHtml(player.nick)}</span>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="stat-value">${player.goals}</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
            } catch (error) {
                console.error('Ошибка:', error);
                tbody.innerHTML = `<tr><td colspan="2" class="loading" style="color: var(--danger)">❌ ${error.message}</td></tr>`;
            } finally {
                refreshBtn.disabled = false;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', loadTopScorers);
    </script>

</body>
</html>
