<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHL - Pepeland Hockey League</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(15, 35, 35, 0.85);
            --bg-hover: #1e293b;
            --teal-dark: #0a1f1f;
            --teal-medium: #0f766e;
            --teal-light: #14b8a6;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(20, 184, 166, 0.3);
            --danger: #ef4444;
            --success: #10b981;
            --glow: 0 0 20px rgba(20, 184, 166, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--teal-dark);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 31, 31, 0.7);
            z-index: -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: var(--glow); }
            50% { box-shadow: 0 0 35px rgba(20, 184, 166, 0.5); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-fade { animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-fade-up { animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-slide-left { animation: slideInLeft 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-slide-right { animation: slideInRight 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        header {
            background: rgba(10, 31, 31, 0.95);
            border-bottom: 2px solid var(--teal-light);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-section:hover { transform: scale(1.03); }

        .logo-shield {
            width: 50px;
            height: 60px;
            background: linear-gradient(135deg, var(--teal-medium), var(--teal-dark));
            clip-path: polygon(50% 100%, 0 40%, 0 15%, 50% 0, 100% 15%, 100% 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: white;
            border: 2px solid var(--teal-light);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-section:hover .logo-shield {
            box-shadow: var(--glow);
            border-color: var(--teal-light);
            animation: float 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .logo-text { display: flex; flex-direction: column; }

        .logo-title {
            font-family: 'Russo One', sans-serif;
            font-size: 24px;
            color: var(--teal-light);
            letter-spacing: 2px;
            line-height: 1;
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-section:hover .logo-title { color: white; text-shadow: var(--glow); }

        .logo-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .nav-menu { display: flex; gap: 15px; align-items: center; }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 0; height: 2px;
            background: var(--teal-light);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }

        .nav-link:hover::after, .nav-link.active::after { width: 80%; }

        .nav-link:hover, .nav-link.active {
            color: var(--teal-light);
            background: rgba(20, 184, 166, 0.1);
            border-color: rgba(20, 184, 166, 0.3);
        }

        .hero {
            padding: 50px 0 30px;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .season-title {
            font-family: 'Russo One', sans-serif;
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 20px rgba(20, 184, 166, 0.4);
            animation: pulseGlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .main-content { padding: 40px 0 60px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .nav-menu { flex-wrap: wrap; justify-content: center; }
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .section-title {
            font-family: 'Russo One', sans-serif;
            font-size: 24px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title-link {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title-link:hover {
            color: var(--teal-light);
            text-shadow: 0 0 15px rgba(20, 184, 166, 0.5);
            transform: translateX(5px);
        }

        .section-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 28px;
            background: var(--teal-light);
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title-link:hover::before {
            box-shadow: 0 0 10px var(--teal-light);
        }

        .section-title::after {
            content: '→';
            font-size: 18px;
            opacity: 0;
            transform: translateX(-5px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--teal-light);
        }

        .section-title-link:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        .matches-list { display: flex; flex-direction: column; gap: 20px; }

        .match-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .match-card:nth-child(1) { animation-delay: 0.1s; }
        .match-card:nth-child(2) { animation-delay: 0.2s; }
        .match-card:nth-child(3) { animation-delay: 0.3s; }
        .match-card:nth-child(4) { animation-delay: 0.4s; }
        .match-card:nth-child(5) { animation-delay: 0.5s; }

        .match-card:hover {
            border-color: var(--teal-light);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px rgba(20, 184, 166, 0.25);
        }

        .match-card.live {
            border-color: var(--danger);
            animation: pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(10, 31, 31, 0.6);
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
        }

        .match-league {
            font-weight: 700;
            color: var(--teal-light);
        }

        .match-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .match-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px 30px;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .team:hover { transform: scale(1.05); }

        .team.right { justify-content: flex-end; text-align: right; }

        .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--teal-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .team:hover .team-logo {
            border-color: var(--teal-light);
            box-shadow: var(--glow);
        }

        .team-info { display: flex; flex-direction: column; }

        .team-name {
            font-family: 'Russo One', sans-serif;
            font-size: 18px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .team:hover .team-name { color: var(--teal-light); }

        .match-score {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 30px;
        }

        .score-value {
            font-family: 'Russo One', sans-serif;
            font-size: 48px;
            color: white;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .match-card:hover .score-value {
            color: var(--teal-light);
            text-shadow: 0 0 20px rgba(20, 184, 166, 0.5);
        }

        .score-separator {
            font-size: 32px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .match-footer {
            padding: 15px 20px;
            background: rgba(10, 31, 31, 0.4);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
        }

        .match-info-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .match-date, .match-location, .match-result {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .match-location {
            color: var(--teal-light);
            font-weight: 600;
        }

        .match-result {
            font-weight: 600;
            color: var(--teal-light);
        }

        .top-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: slideInRight 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-card:hover {
            border-color: var(--teal-light);
            box-shadow: var(--glow);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .leaderboard-table th {
            text-align: left;
            font-size: 12px;
            color: var(--text-muted);
            padding: 10px 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .player-row-container {
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, box-shadow;
        }

        .leaderboard-table tbody tr {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .leaderboard-table tbody tr td {
            padding: 14px 18px;
            background: rgba(15, 35, 35, 0.6);
            border-radius: 8px;
            vertical-align: middle;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .leaderboard-table td:first-child { width: 70%; }

        .leaderboard-table td:last-child {
            text-align: center;
            min-width: 60px;
            position: relative;
        }

        .leaderboard-table tbody tr:hover td {
            background: rgba(20, 184, 166, 0.15);
            box-shadow: 0 0 25px rgba(20, 184, 166, 0.25);
            border: 1px solid rgba(20, 184, 166, 0.4);
        }

        .leaderboard-table tbody tr:hover .player-row-container {
            transform: scale(1.02);
            z-index: 10;
        }

        .player-row { 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        .rank {
            font-family: 'Russo One', sans-serif;
            font-size: 16px;
            width: 32px;
            text-align: center;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .rank.gold { color: #fbbf24; }
        .rank.silver { color: #94a3b8; }
        .rank.bronze { color: #b45309; }

        .leaderboard-table tbody tr:hover .rank {
            color: var(--teal-light);
            text-shadow: 0 0 10px rgba(20, 184, 166, 0.6);
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--teal-dark);
            background-size: cover;
            image-rendering: pixelated;
            border: 2px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            will-change: transform, box-shadow;
        }

        .leaderboard-table tbody tr:hover .player-avatar {
            border-color: var(--teal-light);
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.4);
            transform: scale(1.1);
        }

        .player-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leaderboard-table tbody tr:hover .player-name { 
            color: var(--teal-light);
            text-shadow: 0 0 10px rgba(20, 184, 166, 0.4);
        }

        .stat-value {
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            color: var(--teal-light);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            position: relative;
            text-align: center;
            width: 100%;
            will-change: transform, text-shadow;
        }

        .leaderboard-table tbody tr:hover .stat-value {
            transform: scale(1.15);
            text-shadow: 0 0 15px rgba(20, 184, 166, 0.8);
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 16px;
            background: linear-gradient(90deg, transparent, rgba(20,184,166,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .error-message {
            text-align: center;
            color: var(--danger);
            padding: 30px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            margin: 20px 0;
        }

        .error-details {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 10px;
            font-family: monospace;
        }

        /* Sync Button */
        .sync-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 24px;
            background: var(--teal-medium);
            color: white;
            border: 2px solid var(--teal-light);
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            margin-top: 20px;
        }

        .sync-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sync-btn:hover::before { left: 100%; }

        .sync-btn:hover {
            background: var(--teal-light);
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .sync-btn:active { transform: translateY(0) scale(0.98); }

        .sync-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .sync-btn.syncing .sync-icon {
            animation: rotate 1s linear infinite;
        }

        .sync-icon {
            width: 20px;
            height: 20px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .show-more-btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            background: var(--bg-hover);
            color: var(--teal-light);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .show-more-btn:hover {
            background: var(--teal-medium);
            border-color: var(--teal-light);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        footer {
            background: rgba(10, 31, 31, 0.95);
            border-top: 2px solid var(--border-color);
            padding: 30px 0;
            margin-top: 40px;
            animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
        }

        .footer-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .copyright {
            color: var(--text-muted);
            font-size: 14px;
        }

        .discord-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--teal-light);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(20, 184, 166, 0.1);
            border: 2px solid var(--teal-light);
            border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .discord-link::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--teal-light);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .discord-link:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .discord-link:hover {
            color: var(--teal-dark);
            transform: translateY(-3px);
            box-shadow: var(--glow);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .discord-link:hover .discord-icon {
            animation: float 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @media (max-width: 768px) {
            .season-title { font-size: 36px; }
            .header-wrapper { flex-direction: column; height: auto; padding: 15px 0; gap: 15px; }
            .nav-menu { gap: 10px; }
            .nav-link { font-size: 12px; padding: 6px 12px; }
            .match-body { flex-direction: column; gap: 20px; padding: 20px; }
            .team { width: 100%; }
            .team.right { justify-content: flex-start; text-align: left; }
            .match-score { padding: 0; }
            .score-value { font-size: 36px; }
            .section-title { font-size: 20px; }
            .footer-content { flex-direction: column; text-align: center; }
            .match-footer { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-wrapper">
                <div class="logo-section" onclick="window.location.href='index.html'">
                    <div class="logo-shield">PHL</div>

                <nav class="nav-menu">
                    <a href="index.html" class="nav-link active">Матчи</a>
                    <a href="teams.html" class="nav-link">Команды</a>
                    <a href="players.html" class="nav-link">Игроки</a>
                    <a href="Standings.html" class="nav-link">Таблица</a>
                </nav>

    </header>

    <section class="hero">
        <div class="container">
            <h1 class="season-title">PHL 3 2026</h1>
        </div>
    </section>

    <main class="main-content">
        <div class="container">
            <div class="dashboard-grid">
                
                <div class="matches-column animate-slide-left">
                    <div class="section-header">
                        <h2 class="section-title">Матчи</h2>
                        <button class="sync-btn" id="matchesSyncBtn" onclick="loadMatches()">
                            <svg class="sync-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                            </svg>
                            <span>Обновить</span>
                        </button>
                    </div>

                    <div class="matches-list" id="matchesList">
                        <div class="match-card">
                            <div class="loading">⏳ Загрузка матчей...</div>
                        </div>
                    </div>
                    
                    <button class="show-more-btn" id="showMoreBtn" onclick="toggleShowMore()" style="display: none;">
                        Показать больше
                    </button>
                </div>

                <div class="sidebar">
                    <div class="section-header">
                        <h2 class="section-title">
                            <a href="strikertop.html" class="section-title-link">Топ Бомбардиров</a>
                        </h2>
                        <button class="sync-btn" id="topSyncBtn" onclick="loadTopScorers()">
                            <svg class="sync-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                            </svg>
                            <span>Обновить</span>
                        </button>
                    </div>

                    <div class="top-card">
                        <table class="leaderboard-table">
                            <thead>
                                <tr>
                                    <th>Игрок</th>
                                    <th>Голы</th>
                                </tr>
                            </thead>
                            <tbody id="topScorersBody">
                                <tr>
                                    <td colspan="2" class="loading">⏳ Загрузка...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="copyright">
                    &copy; 2026 PHL. Pepeland Hockey League
                </div>
                <a href="https://discord.gg/cDBgBz6VgW" target="_blank" class="discord-link">
                    <svg class="discord-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                    Discord сервер
                </a>
            </div>
        </div>
    </footer>

    <script>
        const MATCHES_CSV = 'https://docs.google.com/spreadsheets/d/1mRCJZcbHU3muCfgJwYJHKR3yPy5Zz4UBudMwtEBX1Es/pub?output=csv';
        const TOP_CSV = 'https://docs.google.com/spreadsheets/d/1mRCJZcbHU3muCfgJwYJHKR3yPy5Zz4UBudMwtEBX1Es/pub?output=csv';
        
        const CORS_PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        let allMatches = [];
        let showAllMatches = false;

        async function fetchWithProxy(url) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.text();
            } catch (e) {
                console.log('Без прокси не вышло, пробуем прокси...');
            }
            
            for (const proxy of CORS_PROXIES) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(url));
                    if (response.ok) return await response.text();
                } catch (e) {
                    console.log(`Прокси ${proxy} не сработал`);
                }
            }
            
            throw new Error('Не удалось загрузить данные');
        }

        async function loadMatches() {
            const container = document.getElementById('matchesList');
            const btn = document.getElementById('matchesSyncBtn');
            
            if (btn) {
                btn.classList.add('syncing');
                btn.disabled = true;
            }
            
            try {
                const csvText = await fetchWithProxy(MATCHES_CSV);
                allMatches = parseMatchesCSV(csvText);
                
                if (allMatches.length === 0) {
                    container.innerHTML = `
                        <div class="match-card">
                            <div class="error-message">
                                ⚠️ Нет данных в таблице
                                <div class="error-details">Проверьте, что в таблице есть данные со 2-й строки</div>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                renderMatches(container);
                
                if (btn) {
                    btn.classList.remove('syncing');
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Ошибка загрузки матчей:', error);
                container.innerHTML = `
                    <div class="match-card">
                        <div class="error-message">
                            ❌ Ошибка загрузки матчей
                            <div class="error-details">${error.message}</div>
                        </div>
                    </div>
                `;
                if (btn) {
                    btn.classList.remove('syncing');
                    btn.disabled = false;
                }
            }
        }

        function parseMatchesCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const matches = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = line.split(',').map(p => p.replace(/^"|"$/g, '').trim());
                if (parts.length >= 7) {
                    matches.push({
                        date: parts[0] || '',
                        time: parts[1] || '',
                        team1: parts[2] || '',
                        team2: parts[3] || '',
                        score1: parts[4] || '0',
                        score2: parts[5] || '0',
                        location: parts[6] || '',
                        status: parts[7] || '',
                        extra: parts[8] || ''
                    });
                }
            }
            return matches;
        }

        function renderMatches(container) {
            container.innerHTML = '';
            
            allMatches.sort((a, b) => {
                if (a.status === 'LIVE') return -1;
                if (b.status === 'LIVE') return 1;
                return 0;
            });
            
            const matchesToShow = showAllMatches ? allMatches : allMatches.slice(0, 5);
            
            if (matchesToShow.length === 0) {
                container.innerHTML = '<div class="match-card"><div class="loading">Нет матчей</div></div>';
                return;
            }
            
            matchesToShow.forEach((match, index) => {
                const isLive = match.status === 'LIVE';
                
                let resultText = 'Основное время';
                if (match.extra.toUpperCase().includes('БУЛ')) {
                    resultText = 'По буллитам';
                } else if (match.extra.toUpperCase().includes('ОТ')) {
                    resultText = 'Овертайм';
                } else if (match.extra.toUpperCase().includes('ОСНОВ')) {
                    resultText = 'Основное время';
                }
                
                const card = document.createElement('div');
                card.className = `match-card ${isLive ? 'live' : ''}`;
                card.style.opacity = '0';
                card.style.animation = `fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) ${index * 0.1}s forwards`;
                
                card.innerHTML = `
                    <div class="match-header">
                        <div class="match-league">PHL</div>
                        <div class="match-status">
                            ${isLive ? '<span class="live-indicator"></span><span style="color: var(--danger)">LIVE</span>' : 'Завершён'}
                        </div>
                    </div>
                    <div class="match-body">
                        <div class="team">
                            <div class="team-logo"></div>
                            <div class="team-info">
                                <div class="team-name">${match.team1}</div>
                            </div>
                        </div>
                        <div class="match-score">
                            <span class="score-value">${match.score1}</span>
                            <span class="score-separator">-</span>
                            <span class="score-value">${match.score2}</span>
                        </div>
                        <div class="team right">
                            <div class="team-info">
                                <div class="team-name">${match.team2}</div>
                            </div>
                            <div class="team-logo"></div>
                        </div>
                    </div>
                    <div class="match-footer">
                        <div class="match-info-group">
                            <div class="match-date">${match.date} • ${match.time}</div>
                            <div class="match-location">${match.location}</div>
                            <div class="match-result">${isLive ? 'LIVE' : resultText}</div>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            const showMoreBtn = document.getElementById('showMoreBtn');
            if (showMoreBtn) {
                if (allMatches.length > 5) {
                    showMoreBtn.style.display = 'block';
                    showMoreBtn.textContent = showAllMatches ? 'Показать меньше' : 'Показать больше';
                } else {
                    showMoreBtn.style.display = 'none';
                }
            }
        }

        function toggleShowMore() {
            showAllMatches = !showAllMatches;
            const container = document.getElementById('matchesList');
            renderMatches(container);
        }
        
        async function loadTopScorers() {
            const tbody = document.getElementById('topScorersBody');
            const btn = document.getElementById('topSyncBtn');
            
            if (btn) {
                btn.classList.add('syncing');
                btn.disabled = true;
            }
            
            tbody.innerHTML = '<tr><td colspan="2" class="loading">⏳ Загрузка...</td></tr>';
            
            try {
                const csvText = await fetchWithProxy(TOP_CSV);
                const lines = csvText.split('\n').filter(line => line.trim());
                
                if (lines.length < 2) throw new Error('Таблица пуста');
                
                const players = [];
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const parts = line.split(',').map(p => p.replace(/^"|"$/g, '').trim());
                    const nick = parts[0];
                    const goals = parseInt(parts[1]) || 0;
                    if (nick && nick.length > 0) players.push({ nick, goals });
                }
                
                if (players.length === 0) throw new Error('Нет игроков в таблице');
                
                players.sort((a, b) => b.goals - a.goals);
                const top = players.slice(0, 10);
                
                tbody.innerHTML = '';
                top.forEach((player, index) => {
                    const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                    const tr = document.createElement('tr');
                    tr.style.opacity = '0';
                    tr.style.animation = `fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) ${index * 0.05}s forwards`;
                    tr.innerHTML = `
                        <td>
                            <div class="player-row-container">
                                <div class="player-row">
                                    <span class="rank ${rankClass}">#${index + 1}</span>
                                    <div class="player-avatar" 
                                         style="background-image: url('https://mc-heads.net/avatar/${encodeURIComponent(player.nick)}')"
                                         onerror="this.style.background='var(--teal-dark)'">
                                    </div>
                                    <span class="player-name">${escapeHtml(player.nick)}</span>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="stat-value">${player.goals}</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                if (btn) {
                    btn.classList.remove('syncing');
                    btn.disabled = false;
                }
                
            } catch (error) {
                console.error('Ошибка:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="2">
                            <div class="error-message" style="padding: 20px;">
                                ❌ Ошибка загрузки
                                <div class="error-details">${error.message}</div>
                            </div>
                        </td>
                    </tr>
                `;
                if (btn) {
                    btn.classList.remove('syncing');
                    btn.disabled = false;
                }
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadMatches();
            loadTopScorers();
        });
    </script>

</body>
